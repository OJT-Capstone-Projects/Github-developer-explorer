<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Developer Explorer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body id="bodyRoot">

  <!-- ========================================
       HEADER
  ========================================= -->
  <header class="header">
    <div class="header-inner">

      <!-- Left: Logo + Title -->
      <div class="header-left">
        <!-- Official GitHub Octocat logo (black, real shape) -->
        <svg class="gh-logo" viewBox="0 0 98 96" xmlns="http://www.w3.org/2000/svg">
          <path fill-rule="evenodd" clip-rule="evenodd"
            d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69
               2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127
               -13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17
               -4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052
               4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6
               -10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2
               -.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052
               a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63
               9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038
               3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283
               1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.526

               C97.707 22 75.788 0 48.854 0z"/>
        </svg>
        <div class="header-text">
          <h1 class="header-title">GitHub Developer Explorer</h1>
          <p class="header-subtitle">Search any GitHub username and explore their profile &amp; repositories</p>
        </div>
      </div>

      <!-- Right: Dark / Light toggle -->
      <button id="themeToggleBtn" class="theme-toggle-btn" title="Toggle dark / light mode">
        <span id="themeIcon" class="theme-icon">&#9790;</span>
        <span id="themeLabel" class="theme-label">Dark Mode</span>
      </button>

    </div>
  </header>

  <!-- ========================================
       MAIN
  ========================================= -->
  <main class="main">

    <!-- SEARCH -->
    <section class="search-section">
      <div class="search-box">
        <label class="search-label" for="searchInput">Enter GitHub Username</label>
        <div class="search-row">
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="e.g. torvalds, gaearon, sindresorhus..."
            autocomplete="off"
          />
          <button id="searchBtn" class="search-btn">Search</button>
        </div>
      </div>
    </section>

    <!-- LOADING  (hidden by default) -->
    <section id="loadingSection" class="loading-section hidden">
      <div class="spinner"></div>
      <p class="loading-text">Fetching developer data...</p>
    </section>

    <!-- ERROR  (hidden by default) -->
    <section id="errorSection" class="error-section hidden">
      <div class="error-box">
        <span class="error-icon">&#9888;</span>
        <p id="errorMessage" class="error-text">Something went wrong.</p>
      </div>
    </section>

    <!-- RESULTS  (hidden by default) -->
    <div id="resultsWrapper" class="results-wrapper hidden">

      <!-- PROFILE -->
      <section class="profile-section">
        <div class="profile-card">
          <img id="profileAvatar" class="profile-avatar" src="" alt="Avatar" />
          <div class="profile-details">
            <h2 id="profileName"     class="profile-name"></h2>
            <p  id="profileUsername" class="profile-username"></p>
            <p  id="profileBio"      class="profile-bio"></p>
            <div class="profile-stats">
              <div class="stat-item">
                <span id="profileFollowers" class="stat-num"></span>
                <span class="stat-lbl">Followers</span>
              </div>
              <div class="stat-divider"></div>
              <div class="stat-item">
                <span id="profileFollowing" class="stat-num"></span>
                <span class="stat-lbl">Following</span>
              </div>
              <div class="stat-divider"></div>
              <div class="stat-item">
                <span id="profileRepos" class="stat-num"></span>
                <span class="stat-lbl">Repos</span>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- REPOSITORIES -->
      <section class="repos-section">
        <h3 class="section-title">Public Repositories</h3>
        <div id="repoGrid" class="repo-grid">
          <!-- injected by displayRepositories() -->
        </div>
      </section>

      <!-- LANGUAGE BREAKDOWN -->
      <section class="lang-section">
        <h3 class="section-title">Language Breakdown</h3>
        <div id="languageGrid" class="lang-grid">
          <!-- injected by displayLanguages() -->
        </div>
      </section>

    </div><!-- /resultsWrapper -->

  </main>

  <!-- ========================================
       FOOTER
  ========================================= -->
  <footer class="footer">
    <div class="footer-inner">

      <!-- Left: logo + name -->
      <div class="footer-brand">
        <svg class="footer-gh-logo" viewBox="0 0 98 96" xmlns="http://www.w3.org/2000/svg">
          <path fill-rule="evenodd" clip-rule="evenodd"
            d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69
               2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127
               -13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17
               -4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052
               4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6
               -10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2
               -.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052
               a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63
               9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038
               3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283
               1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.526
               0 1.304.89 2.853 3.316 2.364 19.412-6.52 33.405-24.935 33.405-46.691
               C97.707 22 75.788 0 48.854 0z"/>
        </svg>
        <span class="footer-name">GitHub Developer Explorer</span>
      </div>

      <!-- Center: quick links -->
      <nav class="footer-links">
        <a class="footer-link" href="https://github.com" target="_blank" rel="noopener">GitHub</a>
        <span class="footer-dot">&#183;</span>
        <a class="footer-link" href="https://docs.github.com" target="_blank" rel="noopener">Docs</a>
        <span class="footer-dot">&#183;</span>
        <a class="footer-link" href="https://github.com/trending" target="_blank" rel="noopener">Trending</a>
      </nav>

      <!-- Right: copyright -->
      <span class="footer-copy">&copy; 2026 All rights reserved</span>

    </div>
  </footer>

  <script src="ui.js"></script>
  <script src="config.js"></script>
  <script src="api.js"></script>
  <script src="app.js"></script>

</body>
</html>
